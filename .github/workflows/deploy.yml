name: Deploy to FTP

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install deps
        run: npm ci

      - name: Create env file
        run: |
          echo "VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }}" > .env
          echo "VITE_SUPABASE_ANON_KEY=${{ secrets.VITE_SUPABASE_ANON_KEY }}" >> .env
          echo "VITE_PUSH_URL=${{ secrets.VITE_PUSH_URL }}" >> .env
          echo "VITE_WEB_PUSH_PUBLIC_KEY=${{ secrets.VITE_WEB_PUSH_PUBLIC_KEY }}" >> .env
          echo "VITE_POSTGREST_URL=${{ secrets.VITE_POSTGREST_URL }}" >> .env

      - name: Build
        run: npm run build

      - name: Prepare deploy bundle
        run: |
          rm -rf deploy
          mkdir deploy
          cp -R dist/* deploy/
          cp -R goroscop deploy/ || true
          cp -R trees deploy/ || true
          cp -R assets deploy/ || true
          cp favicon.png deploy/ || true

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: ${{ secrets.FTP_PORT }}
          protocol: ftp
          local-dir: deploy/
          server-dir: /   # FTP user home is already /www/liga.skrebeyko.ru
          dangerous-clean-slate: true
