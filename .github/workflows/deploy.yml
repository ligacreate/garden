name: Deploy to FTP

on:
  push:
    branches: ["main"]
    paths-ignore:
      - 'docs/**'
      - 'plans/**'
      - '.business/**'
      - '.claude/**'
      - '*.md'
  workflow_dispatch:

concurrency:
  group: deploy-ftp
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install deps
        run: npm ci

      - name: Create env file
        run: |
          echo "VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }}" > .env
          echo "VITE_SUPABASE_ANON_KEY=${{ secrets.VITE_SUPABASE_ANON_KEY }}" >> .env
          echo "VITE_PUSH_URL=${{ secrets.VITE_PUSH_URL }}" >> .env
          echo "VITE_WEB_PUSH_PUBLIC_KEY=${{ secrets.VITE_WEB_PUSH_PUBLIC_KEY }}" >> .env
          echo "VITE_POSTGREST_URL=${{ secrets.VITE_POSTGREST_URL }}" >> .env

      - name: Build
        run: npm run build

      - name: Prepare deploy bundle
        run: |
          rm -rf deploy
          mkdir deploy
          # dist/. (а не dist/*) копирует и dotfiles — иначе .htaccess
          # с CORS/cache-заголовками не уезжает на FTP, а
          # dangerous-clean-slate сносит ранее залитый руками файл.
          cp -R dist/. deploy/
          cp -R goroscop deploy/ || true
          cp -R trees deploy/ || true
          cp -R assets deploy/ || true
          cp favicon.png deploy/ || true

      - name: Deploy via FTP (всё, кроме assets/)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: ${{ secrets.FTP_PORT }}
          protocol: ftp
          local-dir: deploy/
          server-dir: /   # FTP user home is already /www/liga.skrebeyko.ru
          # INFRA-005: убрали dangerous-clean-slate — каталог больше не сносится,
          # старые хеш-чанки в assets/ переживают деплой. exclude выводит assets/
          # из-под diff-синхронизации action'а; его доставляет отдельный
          # additive lftp-шаг ниже (--no-delete). Остальное (index.html, sw.js,
          # goroscop, trees, favicon) action синхронизирует и чистит их орфаны.
          exclude: |
            assets/**

      - name: Upload assets additively (lftp --no-delete)
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_PORT: ${{ secrets.FTP_PORT }}
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y -qq lftp
          # Источник = deploy/assets/ (Vite-чанки + статика, уже смержены в
          # шаге Prepare deploy bundle), НЕ dist/assets/. --no-delete: старые
          # хеш-чанки на сервере не трогаем → стейл-вкладки догрузят свои модули.
          lftp -c "
            set ftp:ssl-allow false;
            set net:max-retries 2;
            open -u \"$FTP_USERNAME\",\"$FTP_PASSWORD\" -p \"$FTP_PORT\" \"$FTP_SERVER\";
            mirror -R --no-delete --parallel=4 --verbose deploy/assets/ assets/;
            bye;
          "

      - name: Smoke check after deploy
        run: |
          set -euo pipefail
          sleep 5
          curl -fsS https://liga.skrebeyko.ru/ -o /tmp/index.html
          grep -q "<title>" /tmp/index.html
          BUNDLE=$(grep -oE 'assets/index-[A-Za-z0-9_-]+\.js' /tmp/index.html | head -1)
          if [ -z "$BUNDLE" ]; then
            echo "ERROR: bundle <script> tag not found in deployed index.html"
            exit 1
          fi
          curl -fsS "https://liga.skrebeyko.ru/$BUNDLE" -o /dev/null
          echo "Deploy smoke OK: $BUNDLE"
