<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="24" flood-color="#000" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="1080" height="1350" fill="#F6F2ED"/>
  <rect x="120" y="140" width="840" height="1070" rx="12" fill="#FFF9F2" filter="url(#shadow)"/>

  <text x="200" y="300" font-family="'Helvetica Neue', Arial, sans-serif" font-size="22" fill="#8B7D70" letter-spacing="2">ОТЗЫВ</text>

  <text x="200" y="380" font-family="'Helvetica Neue', Arial, sans-serif" font-size="44" fill="#2B211A">
    <tspan x="200" dy="0">Тёплая, ясная встреча.</tspan>
    <tspan x="200" dy="60">Я унесла с собой чувство</tspan>
    <tspan x="200" dy="60">опоры и мягкой силы.</tspan>
  </text>

  <text x="200" y="800" font-family="'Helvetica Neue', Arial, sans-serif" font-size="28" fill="#2B211A">Софья М.</text>
</svg>
