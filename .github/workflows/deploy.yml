name: Deploy to FTP

on:
  push:
    branches: ["main"]
    paths-ignore:
      - 'docs/**'
      - 'plans/**'
      - '.business/**'
      - '.claude/**'
      - '*.md'
  workflow_dispatch:

concurrency:
  group: deploy-ftp
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install deps
        run: npm ci

      - name: Create env file
        run: |
          echo "VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }}" > .env
          echo "VITE_SUPABASE_ANON_KEY=${{ secrets.VITE_SUPABASE_ANON_KEY }}" >> .env
          echo "VITE_PUSH_URL=${{ secrets.VITE_PUSH_URL }}" >> .env
          echo "VITE_WEB_PUSH_PUBLIC_KEY=${{ secrets.VITE_WEB_PUSH_PUBLIC_KEY }}" >> .env
          echo "VITE_POSTGREST_URL=${{ secrets.VITE_POSTGREST_URL }}" >> .env

      - name: Build
        run: npm run build

      - name: Prepare deploy bundle
        run: |
          rm -rf deploy
          mkdir deploy
          # dist/. (а не dist/*) копирует и dotfiles — иначе .htaccess
          # с CORS/cache-заголовками не уезжает на FTP, а
          # dangerous-clean-slate сносит ранее залитый руками файл.
          cp -R dist/. deploy/
          cp -R goroscop deploy/ || true
          cp -R trees deploy/ || true
          cp -R assets deploy/ || true
          cp favicon.png deploy/ || true

      - name: Prefetch live assets/ (ретенция старых чанков, non-fatal)
        continue-on-error: true
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_PORT: ${{ secrets.FTP_PORT }}
        run: |
          set +e   # шаг не должен валить деплой; при частичной загрузке всё равно мержим
          sudo apt-get update -qq
          sudo apt-get install -y -qq lftp
          mkdir -p live_assets
          # INFRA-005 v3: скачиваем текущие серверные assets/ (download = mirror
          # без -R) и мержим в bundle, чтобы старые хеш-чанки пережили
          # clean-slate-выкладку. Auth через --env-password: пароль из
          # LFTP_PASSWORD, не из строки команды → устойчив к спецсимволам
          # (v2 падал на 530 Login incorrect из-за манглинга пароля в lftp -e).
          export LFTP_PASSWORD="$FTP_PASSWORD"
          lftp --env-password -u "$FTP_USERNAME" -p "$FTP_PORT" "$FTP_SERVER" -e "
            set ftp:ssl-allow false;
            set ftp:passive-mode true;
            set net:max-retries 2;
            set net:timeout 15;
            mirror --parallel=4 assets/ live_assets/;
            bye;
          "
          # Мерж старых чанков в bundle БЕЗ перезатирания свежих (cp -n).
          # Свежий билд приоритетнее; совпавший хеш = идентичный контент.
          cp -rn live_assets/. deploy/assets/ 2>/dev/null || true
          echo "deploy/assets файлов после мержа: $(ls deploy/assets 2>/dev/null | wc -l)"

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: ${{ secrets.FTP_PORT }}
          protocol: ftp
          local-dir: deploy/
          server-dir: /   # FTP user home is already /www/liga.skrebeyko.ru
          dangerous-clean-slate: true

      - name: Smoke check after deploy
        run: |
          set -euo pipefail
          sleep 5
          curl -fsS https://liga.skrebeyko.ru/ -o /tmp/index.html
          grep -q "<title>" /tmp/index.html
          BUNDLE=$(grep -oE 'assets/index-[A-Za-z0-9_-]+\.js' /tmp/index.html | head -1)
          if [ -z "$BUNDLE" ]; then
            echo "ERROR: bundle <script> tag not found in deployed index.html"
            exit 1
          fi
          curl -fsS "https://liga.skrebeyko.ru/$BUNDLE" -o /dev/null
          echo "Deploy smoke OK: $BUNDLE"
